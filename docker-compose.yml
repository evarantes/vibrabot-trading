version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: codexiaauditor-postgres
    environment:
      POSTGRES_DB: codexiaauditor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - codexiaauditor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codexiaauditor"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  codexiaauditor_pgdata:
